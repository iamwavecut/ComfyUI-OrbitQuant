name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  node-pack-tests:
    name: Node pack tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install test environment
        shell: bash
        run: |
          uv venv
          uv pip install --python .venv/bin/python --no-deps -e .
          uv pip install --python .venv/bin/python pytest ruff build twine

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Test
        run: uv run --no-sync pytest -q

      - name: Build package
        run: uv run --no-sync python -m build

      - name: Check package metadata
        run: uv run --no-sync python -m twine check dist/*

      - name: Smoke test wheel
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          uv venv "$tmpdir/.venv"
          uv pip install --python "$tmpdir/.venv/bin/python" --no-deps dist/comfyui_orbitquant-0.1.0-py3-none-any.whl
          "$tmpdir/.venv/bin/python" -c "import comfyui_orbitquant; print(sorted(comfyui_orbitquant.NODE_CLASS_MAPPINGS))"
