name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish
        required: true
        default: "0.1.2"

jobs:
  build:
    name: Build distributions
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Verify version
        shell: bash
        run: |
          version="$(
            python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          test "$version" = "${{ inputs.version }}"

      - name: Install test environment
        shell: bash
        run: |
          uv venv
          uv pip install --python .venv/bin/python --no-deps -e .
          uv pip install --python .venv/bin/python pytest ruff build twine

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Test
        run: uv run --no-sync pytest -q

      - name: Build package
        run: uv run --no-sync python -m build

      - name: Check package metadata
        run: uv run --no-sync python -m twine check dist/*

      - name: Smoke test wheel
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          uv venv "$tmpdir/.venv"
          uv pip install --python "$tmpdir/.venv/bin/python" --no-deps dist/*.whl
          "$tmpdir/.venv/bin/python" -c "import comfyui_orbitquant; print(sorted(comfyui_orbitquant.NODE_CLASS_MAPPINGS))"

      - name: Upload distributions
        uses: actions/upload-artifact@v6.0.0
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/comfyui-orbitquant
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7.0.0
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
